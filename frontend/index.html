<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGCP — Iniciar sesión</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <h1>✂ SGCP</h1>
    <p class="subtitle">Sistema de Gestión de Citas para Peluquería</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <p id="loginError" class="error hidden"></p>
      <button type="submit" id="loginBtn">Ingresar</button>
    </form>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Si ya hay sesión activa, ir al dashboard
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Ingresando…';
      err.classList.add('hidden');

      const ok = await Auth.login(
        document.getElementById('username').value,
        document.getElementById('password').value
      );

      if (ok) {
        window.location.href = 'dashboard.html';
      } else {
        err.textContent = 'Usuario o contraseña incorrectos.';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
