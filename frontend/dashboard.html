<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGCP — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────── -->
  <nav class="navbar">
    <span class="nav-brand">✂ SGCP</span>
    <div class="nav-tabs" id="navTabs">
      <button class="tab-btn active" data-section="peluquerias">Peluquerías</button>
      <button class="tab-btn" data-section="estilistas">Estilistas</button>
      <button class="tab-btn" data-section="servicios">Servicios</button>
      <button class="tab-btn" data-section="usuarios">Usuarios</button>
      <button class="tab-btn" data-section="citas">Citas</button>
      <button class="tab-btn" data-section="horarios">Horarios</button>
    </div>
    <button id="logoutBtn" class="btn btn-danger-sm">Cerrar sesión</button>
  </nav>

  <!-- ── CONTENIDO PRINCIPAL ────────────────────────────── -->
  <main class="container">

    <!-- PELUQUERÍAS -->
    <section id="sec-peluquerias" class="section active">
      <div class="section-header">
        <h2>Peluquerías</h2>
        <button class="btn btn-primary" id="btnNewPeluqueria">+ Nueva</button>
      </div>
      <div id="tablePeluquerias"></div>
    </section>

    <!-- ESTILISTAS -->
    <section id="sec-estilistas" class="section">
      <div class="section-header">
        <h2>Estilistas</h2>
        <button class="btn btn-primary" id="btnNewEstilista">+ Nuevo</button>
      </div>
      <div id="tableEstilistas"></div>
    </section>

    <!-- SERVICIOS -->
    <section id="sec-servicios" class="section">
      <div class="section-header">
        <h2>Servicios</h2>
        <button class="btn btn-primary" id="btnNewServicio">+ Nuevo</button>
      </div>
      <div id="tableServicios"></div>
    </section>

    <!-- USUARIOS -->
    <section id="sec-usuarios" class="section">
      <div class="section-header">
        <h2>Usuarios</h2>
        <button class="btn btn-primary" id="btnNewUsuario">+ Nuevo</button>
      </div>
      <div id="tableUsuarios"></div>
    </section>

    <!-- CITAS -->
    <section id="sec-citas" class="section">
      <div class="section-header">
        <h2>Citas</h2>
        <button class="btn btn-primary" id="btnNewCita">+ Nueva</button>
      </div>
      <div id="tableCitas"></div>
    </section>

    <!-- HORARIOS -->
    <section id="sec-horarios" class="section">
      <div class="section-header">
        <h2>Horarios de Estilistas</h2>
        <button class="btn btn-primary" id="btnNewHorario">+ Nuevo</button>
      </div>
      <div id="tableHorarios"></div>
    </section>

  </main>

  <!-- ── MODAL GENÉRICO ─────────────────────────────────── -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Formulario</h3>
        <button id="modalClose" class="modal-close">✕</button>
      </div>
      <form id="modalForm"></form>
      <p id="modalError" class="error hidden"></p>
      <div class="modal-footer">
        <button id="modalCancel" class="btn btn-ghost">Cancelar</button>
        <button id="modalSubmit" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- ── SCRIPTS ────────────────────────────────────────── -->
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
